# =============================================
# Voice Assistant - Application Configuration
# =============================================

server.port=${PORT:10000}
spring.application.name=voice-assistant

# ── Vosk Speech Recognition ──
# Download small English model (~40MB) from:
# https://alphacephei.com/vosk/models  → vosk-model-small-en-us-0.15
# Extract it and set the path below:
vosk.model.path=src/main/resources/vosk-model

# ── App Paths (update these to match YOUR machine) ──
# Windows paths shown — change for macOS/Linux
app.path.chrome=C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe
app.path.whatsapp=C:\\Users\\%USERNAME%\\AppData\\Local\\WhatsApp\\WhatsApp.exe
app.path.notepad=notepad.exe
app.path.calculator=calc.exe
app.path.vlc=C:\\Program Files\\VideoLAN\\VLC\\vlc.exe
app.path.spotify=C:\\Users\\%USERNAME%\\AppData\\Roaming\\Spotify\\Spotify.exe
app.path.vscode=C:\\Users\\%USERNAME%\\AppData\\Local\\Programs\\Microsoft VS Code\\Code.exe
app.path.explorer=explorer.exe
app.path.word=C:\\Program Files\\Microsoft Office\\root\\Office16\\WINWORD.EXE
app.path.excel=C:\\Program Files\\Microsoft Office\\root\\Office16\\EXCEL.EXE

# ── Music folder ──
music.folder.path=C:\\Users\\%USERNAME%\\Music

# ── Listening duration in milliseconds ──
voice.listen.duration.ms=6000

# ── Logging ──
logging.level.com.assistant=DEBUG
logging.pattern.console=%d{HH:mm:ss} [%level] %logger{20} - %msg%n

# ── Disable Spring Boot banner for clean output ──
spring.main.banner-mode=off
